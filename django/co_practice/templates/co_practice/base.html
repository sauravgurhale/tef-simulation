{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEF CO Practice</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    body { background-color: #F5F1EB; }
  </style>
</head>
<body class="text-gray-800 min-h-screen">
  <nav class="bg-[#F5F1EB] border-b border-[#E8E0D5] sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 h-12 flex items-center gap-2 text-sm">
      <a href="{% url 'main_home' %}" class="text-[#7C6452] hover:text-[#5E4A3B] font-medium transition-colors">TEF Practice</a>
      {% block breadcrumb %}{% endblock %}
    </div>
  </nav>
  {% block content %}{% endblock %}
</body>
</html>
