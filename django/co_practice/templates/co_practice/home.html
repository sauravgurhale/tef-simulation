{% extends "co_practice/base.html" %}
{% load static %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-10">
  <h1 class="text-2xl font-bold text-gray-900 mb-2">TEF — Compréhension Orale</h1>
  <p class="text-sm text-gray-400 mb-10">Choisissez une pratique pour commencer.</p>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    {% for practice in practices %}
    <div class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm flex flex-col gap-3"
         x-data="{
           get attempted() {
             let n = 0;
             for (let i = 1; i <= 40; i++) {
               if (localStorage.getItem('tef_p{{ practice.slug }}_q' + i)) n++;
             }
             return n;
           }
         }">
      <div class="flex items-start justify-between">
        <div>
          <p class="text-lg font-bold text-gray-900">{{ practice.label }}</p>
          <p class="text-xs text-gray-400 mt-0.5">
            <span x-text="attempted"></span> / 40 questions tentées
          </p>
        </div>
        <span class="text-xs font-semibold px-2 py-1 rounded bg-indigo-50 text-indigo-600">40 Q</span>
      </div>

      <div class="w-full bg-gray-100 rounded-full h-1.5">
        <div class="bg-indigo-400 h-1.5 rounded-full transition-all"
             :style="'width: ' + Math.round(attempted / 40 * 100) + '%'"></div>
      </div>

      <a href="{% url 'practice_index' practice.slug %}"
         class="mt-1 inline-flex items-center justify-center gap-2 px-4 py-2 bg-indigo-600 text-white text-sm font-semibold rounded hover:bg-indigo-700 transition-colors">
        <span x-text="attempted > 0 ? 'Continuer →' : 'Commencer →'"></span>
      </a>
    </div>
    {% empty %}
    <p class="text-gray-400 col-span-2">Aucune pratique disponible.</p>
    {% endfor %}
  </div>
</div>
{% endblock %}
