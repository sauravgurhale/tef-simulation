{% extends "co_practice/base.html" %}
{% load static %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-10">
  <h1 class="text-2xl font-bold mb-8 text-gray-900">TEF — Compréhension Orale (CO 18)</h1>

  <div class="mb-6">
    <a href="{% url 'results' %}"
       class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white text-sm font-semibold rounded hover:bg-indigo-700 transition-colors">
      Voir les résultats →
    </a>
  </div>

  {% for group in groups %}
  <div class="mb-8">
    <p class="text-xs font-semibold uppercase tracking-widest text-gray-400 mb-3">
      {{ group.label }}
    </p>
    <div class="flex flex-wrap gap-2">
      {% for qid in group.questions %}
      <a href="{% url 'question' qid %}"
         class="w-11 h-11 flex items-center justify-center border-2 border-gray-300 rounded font-semibold text-sm text-gray-700 hover:border-indigo-500 hover:bg-indigo-50 hover:text-indigo-700 transition-colors">
        {{ qid }}
      </a>
      {% endfor %}
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
