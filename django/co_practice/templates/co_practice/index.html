{% extends "co_practice/base.html" %}
{% load static %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-10"
     x-data="{
       attempted: {},
       init() {
         for (let i = 1; i <= 40; i++) {
           if (localStorage.getItem('tef_p{{ practice_slug }}_q' + i)) this.attempted[i] = true;
         }
       },
       get attemptedCount() {
         return Object.keys(this.attempted).length;
       }
     }">

  <div class="flex items-start justify-between mb-8">
    <div>
      <p class="text-xs text-gray-400 mb-1">
        <a href="{% url 'home' %}" class="hover:text-indigo-600">← Accueil</a>
      </p>
      <h1 class="text-2xl font-bold text-gray-900">TEF CO {{ practice_slug }}</h1>
      <p class="text-sm text-gray-400 mt-1">
        <span x-text="attemptedCount"></span> / 40 questions tentées
      </p>
    </div>
    <a href="{% url 'results' practice_slug %}"
       class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white text-sm font-semibold rounded hover:bg-indigo-700 transition-colors">
      Voir les résultats →
    </a>
  </div>

  {% for group in groups %}
  <div class="mb-8">
    <p class="text-xs font-semibold uppercase tracking-widest text-gray-400 mb-3">
      {{ group.label }}
    </p>
    <div class="flex flex-wrap gap-2">
      {% for qid in group.questions %}
      <a href="{% url 'question' practice_slug qid %}"
         :class="attempted[{{ qid }}]
           ? 'border-indigo-400 bg-indigo-50 text-indigo-700 hover:border-indigo-600'
           : 'border-gray-300 text-gray-700 hover:border-indigo-500 hover:bg-indigo-50 hover:text-indigo-700'"
         class="w-11 h-11 flex items-center justify-center border-2 rounded font-semibold text-sm transition-colors">
        {{ qid }}
      </a>
      {% endfor %}
    </div>
  </div>
  {% endfor %}

</div>
{% endblock %}
